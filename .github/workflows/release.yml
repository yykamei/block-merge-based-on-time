name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 3.10.1). "v" prefix is NOT needed. If omitted, the patch version is incremented automatically.'
        required: false
permissions: {}
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          check-latest: true
          cache: npm

      - run: npm ci

      - name: Decide the next version
        id: version
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            if ! echo "$INPUT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format: must be X.Y.Z (e.g. 3.10.1)"
              exit 1
            fi
            next="$INPUT_VERSION"
          else
            latest=$(gh release view --json tagName --jq .tagName)
            next=$(echo ${latest#v} | awk -F . '{patch = $3; patch++; printf "%d.%d.%d", $1, $2, patch}')
          fi
          echo "next=${next}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_VERSION: ${{ inputs.version }}

      - name: Bump the package version
        run: |
          mv package.json /tmp/
          jq --arg v "$NEXT_VERSION" '.version = $v' /tmp/package.json | tee package.json
          npm i --package-lock-only
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next }}

      - uses: yykamei/actions-git-push@c9bcec4304fde1cf89d4abdf23280713e66c034d # main
        with:
          commit-message: Bump to ${{ steps.version.outputs.next }}

      - uses: yykamei/actions-release-actions@451f5f47bc1e9cdad23d644cefd5413fe557b94a # main
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag: v${{ steps.version.outputs.next }}
          apply: true
